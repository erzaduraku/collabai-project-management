name: Create GitHub Project Board

on:
  workflow_dispatch:
    inputs:
      project_title:
        description: "Title for the GitHub Project board"
        required: false
        default: "CollabAI Sprint Board"

permissions:
  issues: read
  contents: read

jobs:
  create-project:
    name: Create Projects v2 board and add issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create Project Board
        env:
          # NOTE: The default GITHUB_TOKEN does NOT have 'project' write scope.
          # You must create a Personal Access Token (classic) with:
          #   - repo scope
          #   - project scope
          # Then add it as a repository secret named PROJECT_TOKEN.
          # See: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/creating-a-personal-access-token
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/create_project.py

      - name: Summary
        if: always()
        run: |
          echo "## Project Board Creation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View projects: https://github.com/${{ github.repository }}/projects" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The board includes a **Sprint** field linked to each issue's milestone (Sprint 1 / 2 / 3)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** If the workflow failed due to token permissions, create a PAT with" >> $GITHUB_STEP_SUMMARY
          echo "> \`repo\` + \`project\` scopes and store it as secret \`PROJECT_TOKEN\`." >> $GITHUB_STEP_SUMMARY
